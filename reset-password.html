<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Comrade Store</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar"><a class="brand" href="login"><svg width="30" height="30" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <rect width="34" height="34" rx="9" fill="#122740"/>
  <path d="M9 13h13l-3.5-3.5M22 13l-3.5 3.5" stroke="#F2A93B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M25 21H12l3.5 3.5M12 21l3.5-3.5" stroke="#2A9D8F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg></span>Comrade Store <small>Beta</small></a></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Reset password</h2>
      <p class="sub" id="subtext">Enter your email and we'll send you a reset link.</p>
      <div class="error-box" id="errorBox" style="display:none;"></div>
      <div class="success-box" id="infoBox" style="display:none;"></div>

      <form id="requestForm">
        <div class="field"><label>Email</label><input name="email" type="email" required></div>
        <button class="btn btn-primary" type="submit">Send reset link</button>
      </form>

      <form id="newPasswordForm" style="display:none;">
        <div class="field"><label>New password</label><input name="password" type="password" required minlength="6"></div>
        <button class="btn btn-primary" type="submit">Set new password</button>
      </form>

      <p class="auth-foot"><a class="linkbtn" href="login">Back to login</a></p>
    </div>
  </div>
  <div id="footerRoot"></div>
  <script type="module" src="js/reset-password.js"></script>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
