<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Comrade Store</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar"><a class="brand" href="login.html"><span class="dot"></span>Comrade Store <small>Beta</small></a></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="sub">Log in to buy and sell with fellow comrades.</p>
      <div class="error-box" id="errorBox" style="display:none;"></div>
      <form id="loginForm">
        <div class="field"><label>Username</label><input name="username" required autocomplete="username"></div>
        <div class="field"><label>Password</label><input name="password" type="password" required autocomplete="current-password"></div>
        <a class="forgot-link linkbtn" href="reset-password.html">Forgot password?</a>
        <button class="btn btn-primary" type="submit">Log in</button>
      </form>
      <p class="auth-foot">New here? <a class="linkbtn" href="register.html">Create an account</a></p>
    </div>
  </div>
  <script type="module" src="js/login.js"></script>
</body>
</html>
