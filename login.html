<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Comrade Store</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar"><a class="brand" href="login"><svg width="30" height="30" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <rect width="34" height="34" rx="9" fill="#122740"/>
  <path d="M9 13h13l-3.5-3.5M22 13l-3.5 3.5" stroke="#F2A93B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M25 21H12l3.5 3.5M12 21l3.5-3.5" stroke="#2A9D8F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg></span>Comrade Store <small>Beta</small></a></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="sub">Log in to buy and sell with fellow comrades.</p>
      <div class="error-box" id="errorBox" style="display:none;"></div>
      <form id="loginForm">
        <div class="field"><label>Username</label><input name="username" required autocomplete="username"></div>
        <div class="field"><label>Password</label><input name="password" type="password" required autocomplete="current-password"></div>
        <a class="forgot-link linkbtn" href="reset-password">Forgot password?</a>
        <button class="btn btn-primary" type="submit">Log in</button>
      </form>
      <p class="auth-foot">New here? <a class="linkbtn" href="register">Create an account</a></p>
    </div>
  </div>
  <div id="footerRoot"></div>
  <script type="module" src="js/login.js"></script>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
