<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comrade Store</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar">
    <a class="brand" href="index.html"><span class="dot"></span>Comrade Store <small>Beta</small></a>
    <div class="user-chip">
      <div class="avatar" id="userChipAvatar">?</div>
      <span id="userChipName"></span>
      <a class="linkbtn" id="adminLink" href="admin.html" style="display:none;margin-right:4px;">Admin</a>
    </div>
  </div>

  <div class="app">
    <div class="feed-header">
      <h1>What comrades are selling</h1>
      <a class="btn btn-gold" href="post-item.html">+ Post an item</a>
    </div>
    <div class="categories" id="categories"></div>
    <div class="filter-bar">
      <select id="countyFilterSelect"></select>
      <select id="institutionFilterSelect"></select>
      <input type="text" id="locationSearchInput" class="location-search-input" placeholder="Search any location, e.g. Moi Avenue, Makutano">
    </div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="ic">🗃️</div>
      <div>No items here yet. Be the first to post in this category!</div>
    </div>
    <div class="grid" id="grid"></div>
    <div style="text-align:center;margin-top:22px;">
      <button class="btn btn-outline" id="loadMoreBtn" style="display:none;">Load more</button>
    </div>

    <a class="fab" href="post-item.html">＋ Sell something</a>
  </div>

  <div class="logout-section">
    <button class="btn btn-outline" id="logoutBtn">Log out</button>
  </div>
  <div id="footerRoot"></div>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
