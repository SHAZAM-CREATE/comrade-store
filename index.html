<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comrade Store</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Buy and sell furniture, electronics, phones, clothes, shoes, books & more on Comrade Store — Kenya's campus marketplace. Filter by county, institution or town.">
<meta property="og:title" content="Comrade Store — Campus Marketplace">
<meta property="og:description" content="Buy and sell second-hand & new items with people near you.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://comradestore.co.ke/">
<link rel="canonical" href="https://comradestore.co.ke/">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar">
<svg width="30" height="30" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <rect width="34" height="34" rx="9" fill="#122740"/>
  <path d="M9 13h13l-3.5-3.5M22 13l-3.5 3.5" stroke="#F2A93B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M25 21H12l3.5 3.5M12 21l3.5-3.5" stroke="#2A9D8F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg></span>Comrade Store <small>Beta</small></a>
    <div class="user-chip" id="userChip"></div>
  </div>
  <div class="description">
<p>Kenya's best marketplace — buy and sell furniture, electronics, clothes, books & more with fellow comrades near you.</p>
  
<div class="app">
    <div class="feed-header">
      <h1>What comrades are selling</h1>
      <a class="btn btn-gold" href="post-item">+ Post an item</a>
    </div>
    <div class="search-row">
      <input type="text" id="productSearchInput" class="product-search-input" placeholder="Search product name, e.g. Sofa, iPhone 13">
      <button type="button" id="productSearchBtn" class="search-btn" aria-label="Search products">🔍</button>
    </div>
    <div class="categories" id="categories"></div>
    <div class="filter-bar">
      <select id="countyFilterSelect"></select>
      <select id="institutionFilterSelect"></select>
      <div class="search-row search-row-inline">
        <input type="text" id="locationSearchInput" class="location-search-input" placeholder="Search any location, e.g. Moi Avenue, Makutano">
        <button type="button" id="locationSearchBtn" class="search-btn" aria-label="Search location">🔍</button>
      </div>
    </div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="ic">🗃️</div>
      <div>No items here yet. Be the first to post in this category!</div>
    </div>
    <div class="grid" id="grid"></div>
    <div style="text-align:center;margin-top:22px;">
      <button class="btn btn-outline" id="loadMoreBtn" style="display:none;">Load more</button>
    </div>

    <a class="fab" href="post-item">＋ Sell something</a>
  </div>

  <div class="logout-section" id="logoutSection">
    <button class="btn btn-outline" id="logoutBtn">Log out</button>
  </div>
  <div id="footerRoot"></div>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
