<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item details — Comrade Store</title>
<meta name="description" content="Browse this listing on Comrade Store — Kenya's campus resale marketplace.">
<meta property="og:type" content="product">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar">
    <a class="brand" href="index"><span class="dot"></span>Comrade Store <small>Beta</small></a>
    <div class="user-chip" id="userChip"></div>
  </div>

  <div class="app">
    <a class="back-link" href="index">← Back to feed</a>
    <div id="detailRoot">
      <div class="detail-grid">
        <div>
          <div class="media-carousel" id="mediaCarousel">
            <div class="media-slide">
              <span class="status-flag" id="statusFlag"></span>
              <span id="mediaIcon"></span>
            </div>
          </div>
          <div class="media-hint" id="mediaHint" style="display:none;">🎥 Swipe right to watch the video →</div>
          <div class="map-card">
            <h3>📍 Location &amp; travel time</h3>
            <div id="detailMap"></div>
            <div id="travelInfo"></div>
          </div>
        </div>
        <div class="detail-panel">
          <span class="tagchip" id="catChip"></span>
          <h1 id="title"></h1>
          <div class="pricetag-lg" id="price"></div>
          <div class="meta-row" id="metaRow"></div>
          <div class="desc-block" id="desc"></div>
          <div class="seller-row" id="sellerRow"></div>
          <div class="contact-box" id="contactBox"></div>
          <div id="sellerControls"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="logout-section" id="logoutSection">
    <button class="btn btn-outline" id="logoutBtn">Log out</button>
  </div>
  <div id="footerRoot"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script type="module" src="js/detail.js"></script>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
