<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Comrade Store</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar"><a class="brand" href="login"><svg width="30" height="30" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <rect width="34" height="34" rx="9" fill="#122740"/>
  <path d="M9 13h13l-3.5-3.5M22 13l-3.5 3.5" stroke="#F2A93B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M25 21H12l3.5 3.5M12 21l3.5-3.5" stroke="#2A9D8F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg></span>Comrade Store <small>Beta</small></a></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Join Comrade Store</h2>
      <p class="sub">Buy and sell second-hand &amp; new items with people near you.</p>
      <div class="error-box" id="errorBox" style="display:none;"></div>
      <form id="registerForm">
        <div class="field"><label>Username</label><input name="username" required pattern="[A-Za-z0-9_]{3,20}" title="3-20 letters, numbers or underscore"><small class="hint">Letters, numbers, underscore only.</small></div>
        <div class="field"><label>Email</label><input name="email" type="email" required></div>
        <div class="field"><label>Phone number</label><input name="phone" type="tel" required placeholder="07XXXXXXXX"></div>
        <div class="field"><label>County</label><select name="county" id="countySelect" required></select></div>
        <div class="field"><label>Institution</label><input name="institution" required placeholder="e.g. University of Nairobi"></div>
        <div class="field"><label>Town</label><input name="town" required placeholder="e.g. Karen"></div>
        <div class="field"><label>Password</label><input name="password" type="password" required minlength="6"><small class="hint">At least 6 characters.</small></div>
        <button class="btn btn-primary" type="submit">Create account</button>
      </form>
      <p class="auth-foot">Already registered? <a class="linkbtn" href="login">Log in</a></p>
    </div>
  </div>
  <div id="footerRoot"></div>
  <script type="module">
    import { KENYA_COUNTIES } from './js/utils.js';
    document.getElementById('countySelect').innerHTML =
      '<option value="" disabled selected>Select county</option>' +
      KENYA_COUNTIES.map(c => `<option value="${c}">${c}</option>`).join('');
  </script>
  <script type="module" src="js/register.js"></script>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
